apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nginx-deploy
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/mohdaadil74097/argocd-nginx-demo.git
    targetRevision: main
    path: .

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
